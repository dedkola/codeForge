apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-codelearn
  namespace: codelearn
spec:
  secretName: wildcard-codelearn-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  issuerRef:
    name: letsencrypt-dns-prod
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - "codelearn.tkweb.site"
    - "*.codelearn.tkweb.site"
