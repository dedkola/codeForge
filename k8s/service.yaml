apiVersion: v1
kind: Service
metadata:
  name: codeforge-service
  labels:
    app: codeforge
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: codeforge
---
