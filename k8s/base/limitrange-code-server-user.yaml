apiVersion: v1
kind: LimitRange
metadata:
  name: code-server-user-limits
  namespace: codelearn
spec:
  limits:
    - type: Container
      max:
        cpu: "1000m"
        memory: "1Gi"
      min:
        cpu: "50m"
        memory: "128Mi"
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
