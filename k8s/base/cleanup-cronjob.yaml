apiVersion: batch/v1
kind: CronJob
metadata:
  name: cs-cleanup
  namespace: codelearn
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - >
                  curl -sf -X POST
                  -H "Authorization: Bearer ${CLEANUP_SECRET}"
                  "${CODEFORGE_APP_URL}/api/code-server/cleanup"
              env:
                - name: CLEANUP_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: codeforge-secrets
                      key: CODE_SERVER_CLEANUP_SECRET
                - name: CODEFORGE_APP_URL
                  valueFrom:
                    secretKeyRef:
                      name: codeforge-secrets
                      key: CODEFORGE_APP_URL
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          restartPolicy: OnFailure
