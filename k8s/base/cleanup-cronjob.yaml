apiVersion: batch/v1
kind: CronJob
metadata:
  name: cs-cleanup
  namespace: codelearn
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: curlimages/curl:latest
              command:
                - curl
                - -sf
                - -X
                - POST
                - -H
                - "Authorization: Bearer $(CS_PROXY_SECRET)"
                - "http://codeforge-service.codelearn.svc.cluster.local:3000/api/code-server/cleanup"
              env:
                - name: CS_PROXY_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: codeforge-secrets
                      key: CS_PROXY_SECRET
          restartPolicy: OnFailure
