apiVersion: batch/v1
kind: CronJob
metadata:
  name: cs-cleanup
  namespace: codelearn
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: curlimages/curl:latest
              command:
                - curl
                - -sf
                - -X
                - POST
                - -H
                - "Authorization: Bearer $(CLEANUP_SECRET)"
                - "https://codeforge.tkweb.site/api/code-server/cleanup"
              env:
                - name: CLEANUP_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: codeforge-secrets
                      key: CODE_SERVER_CLEANUP_SECRET
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
          restartPolicy: OnFailure
