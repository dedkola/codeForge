apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: code-server-user-ingress
  namespace: codelearn
spec:
  podSelector:
    matchLabels:
      app: code-server-user
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
