apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeforge
  labels:
    app: codeforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: codeforge
  template:
    metadata:
      labels:
        app: codeforge
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: codeforge
          image: ghcr.io/dedkola/codeforge:20260401102747-ef8cab1 # {"$imagepolicy": "flux-system:codeforge"}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: DOCKER_BUILD
              value: "true"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: codeforge-secrets
