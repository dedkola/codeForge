apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: codelearn
  labels:
    app: code-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
    spec:
      containers:
        - name: code-server
          image: codercom/code-server:latest
          ports:
            - containerPort: 80
          env:
            - name: HOME
              value: /home/coder
          args:
            - --bind-addr=0.0.0.0:80
            - --auth=none
            - --disable-telemetry
            - /home/coder/project
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: workspace
              mountPath: /home/coder/project
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: code-server-pvc
