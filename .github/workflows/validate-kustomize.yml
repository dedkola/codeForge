name: Validate Kustomize Manifests

on:
  pull_request:
    paths:
      - "k8s/**"
      - ".github/workflows/validate-kustomize.yml"
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - ".github/workflows/validate-kustomize.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Validate prod overlay
        run: kubectl kustomize k8s/overlays/prod > /tmp/kustomize-prod.yaml

      - name: Validate dev overlay
        run: kubectl kustomize k8s/overlays/dev > /tmp/kustomize-dev.yaml

      - name: Validate root umbrella
        run: kubectl kustomize k8s > /tmp/kustomize-root.yaml
