apiVersion: apps/v1
kind: Deployment
metadata:
  name: cs-proxy
  namespace: codelearn
  labels:
    app: cs-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cs-proxy
  template:
    metadata:
      labels:
        app: cs-proxy
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: cs-proxy
          image: ghcr.io/dedkola/codeforge/cs-proxy:20260401162731-e15bc10
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: NAMESPACE
              value: "codelearn"
            - name: CS_PROXY_SECRET
              valueFrom:
                secretKeyRef:
                  name: codeforge-secrets
                  key: CS_PROXY_SECRET
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
