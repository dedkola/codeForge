apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cs-proxy
  namespace: codelearn
  labels:
    app: cs-proxy
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "lan-ca"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
    # Per-user subdomain: <slug>.cs-proxy.tkweb.site
    # Each user gets an isolated cs_session cookie scoped to their subdomain.
    - host: "*.cs-proxy.tkweb.site"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cs-proxy
                port:
                  number: 80
    # Keep base domain for direct access / health checks
    - host: cs-proxy.tkweb.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cs-proxy
                port:
                  number: 80
  tls:
    - hosts:
        - cs-proxy.tkweb.site
        - "*.cs-proxy.tkweb.site"
      secretName: cs-proxy-tls
